<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲食記錄研究</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="top-bar">
        <a href="/hub" style="display:inline-flex; align-items:center; text-decoration:none;">
            <img src="/static/logo.jpeg" alt="Logo" style="cursor: pointer;">
        </a>
    </div>
    <div class="container">
        <div class="content">
            <div style="text-align: center; margin-bottom: 25px;">
                <h1 style="margin: 0;">您好！感謝您參與本次研究。</h1>
            </div>
            <p>我們需要您完成一個簡單的任務：連續記錄3天的飲食情況。</p>
            
            <h2>具體需要您做：</h2>
            <ol>
                <li>記錄3天（2個連續工作日 + 1個休息日）</li>
                <li>拍攝所有您吃喝的東西（三餐、零食、飲料等）</li>
                <li>記錄基本的飲食相關資訊</li>
            </ol>
            
            <p>每天大約需要3-5分鐘。您的記錄將幫助我們更好地評估營養狀況。</p>
            <p class="note">所有資訊都將嚴格保密，僅用於研究分析。</p>
            
            <div style="text-align: center;">
                <a href="/login" style="text-decoration: none;">
                    <button class="start-btn">開始</button>
                </a>
            </div>

        </div>
    </div>
</body>
</html>
